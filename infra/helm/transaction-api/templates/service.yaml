apiVersion: v1
kind: Service
metadata:
  name: transaction-api
  namespace: {{ .Values.namespace }}
  labels:
    app: transaction-api
spec:
  selector:
    app: transaction-api
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
  type: {{ .Values.service.type }}