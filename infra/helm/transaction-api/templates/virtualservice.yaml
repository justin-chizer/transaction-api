apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: transaction-api
  namespace: {{ .Values.namespace }}
spec:
  hosts:
    - {{ .Values.istio.host }}
  gateways:
    - transaction-api-gateway
  http:
    - match:
        - uri:
            exact: /health
      route:
        - destination:
            host: transaction-api
            port:
              number: {{ .Values.service.port }}
    - match:
        - uri:
            prefix: /api
      route:
        - destination:
            host: transaction-api
            port:
              number: {{ .Values.service.port }}
      timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 10s
        retryOn: gateway-error,connect-failure,retriable-4xx