gateways:
  istio-ingressgateway:
    enabled: true
    name: istio-ingressgateway
    namespace: istio-ingress

    service:
      type: LoadBalancer
      annotations:
        service.beta.kubernetes.io/azure-load-balancer-internal: "false"
      ports:
        - name: https
          port: 443
          targetPort: 8443
        - name: status-port
          port: 15021
          targetPort: 15021

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

    autoscaleEnabled: true
    autoscaleMin: 2
    autoscaleMax: 5

    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - istio-ingressgateway
              topologyKey: kubernetes.io/hostname